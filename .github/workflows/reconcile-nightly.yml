name: Reconcile (nightly)

# Layer 5 cross-source reconciliation. This job makes a real
# network call to stats.nba.com (via the optional ``nba_api``
# dependency in the ``[reconcile]`` extra) and diffs the official
# response against the warehouse DuckDB.
#
# Scheduling: 04:00 UTC every day. Early-morning is intentional —
# stats.nba.com has been observed to be more reliable and
# rate-limit-friendly outside US business hours.
#
# The job NEVER runs on push or pull_request — regular CI must
# stay network-free. It is also runnable on demand via
# ``workflow_dispatch`` for ad-hoc checks.
#
# Failure mode:
#   * HIGH-severity discrepancies -> exit 1, the workflow turns red.
#   * Stub-only runs -> exit 0 (see reconcile_official._run_reconciliation
#     for the exit-code policy).
#   * Network/HTTP errors after retries are exhausted -> the endpoint
#     is recorded as ``status: error`` in the report and the workflow
#     continues with the other endpoints.

"on":
  schedule:
    # 04:00 UTC daily. Coordinated Universal Time, not US local.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Per-endpoint row cap (default 500)."
        required: false
        type: number
        default: 500
      endpoint:
        description: >
          Optional single endpoint to run (e.g. ``dim_player``). If
          omitted, all nine endpoints in ENDPOINT_MAP are attempted.
        required: false
        type: choice
        options:
          - ""
          - dim_player
          - dim_game
          - fact_player_game_boxscore
          - fact_player_season_stats
          - fact_team_game_boxscore
          - v_team_standings
          - v_franchise_leaders
          - fact_pbp_event
          - shots
        default: ""

concurrency:
  group: reconcile-nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reconcile:
    name: Layer 5 reconcile (nba_api vs. warehouse)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      # The [reconcile] extra pulls in nba_api + requests + pandas. The
      # base ``[project].dependencies`` stay network-free.
      - name: Sync dependencies (with reconcile extra)
        run: uv sync --extra dev --extra reconcile

      - name: Run reconciliation
        env:
          # DuckDB snapshot is gitignored; the 22 GB file is mounted on
          # the self-hosted runner that owns this job. If the snapshot
          # is absent, _open_duckdb_read_only() turns the run into a
          # "warehouse unavailable" error per endpoint (not a hard
          # failure of the workflow).
          DUCKDB_PATH: ${{ vars.RECONCILE_DUCKDB_PATH || '../data/nba.duckdb' }}
        run: |
          set -euo pipefail
          LIMIT="${{ github.event.inputs.limit || '500' }}"
          ENDPOINT_ARG=""
          if [ -n "${{ github.event.inputs.endpoint }}" ]; then
            ENDPOINT_ARG="--endpoint ${{ github.event.inputs.endpoint }}"
          fi
          mkdir -p reports
          # The CLI writes a JSON report and (optionally) a markdown
          # summary, then posts a one-line summary to stdout. Exit
          # code 0 = clean / stub-only, 1 = HIGH discrepancy, 2 = setup
          # error (nba_api missing, etc.). The ``|| true`` lets the
          # markdown step always run, so the summary is still produced
          # even when the reconciliation surfaces a HIGH diff.
          uv run python -m \
            basketball_data_emporium.verification.reconcile_official \
            --run --limit "${LIMIT}" ${ENDPOINT_ARG} \
            --output "reports/reconcile-$(date -u +%Y%m%dT%H%M%SZ).json" \
            --markdown "reports/reconcile-$(date -u +%Y%m%dT%H%M%SZ).md" \
            || EXIT=$?
          EXIT="${EXIT:-0}"
          echo "reconcile exit code: ${EXIT}"

          # Always post a summary to the GitHub step summary, even on
          # HIGH-discrepancy failures, so the failure has full context.
          if ls reports/reconcile-*.md >/dev/null 2>&1; then
            LATEST_MD=$(ls -t reports/reconcile-*.md | head -1)
            echo "## Reconcile summary ($(basename "${LATEST_MD}"))" \
              >> "$GITHUB_STEP_SUMMARY"
            cat "${LATEST_MD}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Reconcile summary" >> "$GITHUB_STEP_SUMMARY"
            echo "_No markdown report produced — see the uploaded artifact._" \
              >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "${EXIT}"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reconcile-report
          path: backend/reports/reconcile-*
          if-no-files-found: warn
          retention-days: 30
