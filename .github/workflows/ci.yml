name: CI

# Wires the gates that already exist in this repo so they run automatically on
# every push and PR, instead of relying on manual discipline:
#   - backend pytest (the DB-dependent layers skip cleanly without the snapshot)
#   - frontend typecheck / lint / unit tests / build
#   - OpenAPI drift gate (scripts/check-openapi-drift.sh)
#
# The data-status gate and Playwright e2e need the 22 GB DuckDB snapshot, which
# is git-ignored and cannot live on a GitHub-hosted runner. They are defined as
# a separate, opt-in job (see `data-status-gate`) for a self-hosted runner that
# mounts the snapshot.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      # The DuckDB snapshot is not present on hosted runners, so the schema /
      # audit / golden / data-shape contract layers skip themselves. The
      # status, envelope, pool, rate-limit, and stubbed-contract layers still
      # run. The OpenAPI drift test lives in its own job (it needs Node), so we
      # exclude tests/openapi here.
      - name: Run pytest
        run: uv run pytest --ignore=tests/openapi

  frontend:
    name: Frontend (typecheck / lint / test / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  openapi-drift:
    name: OpenAPI drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # The drift script ends with a bare `python` call for the diff, so make
      # sure `python` resolves on PATH (uv provides the backend interpreter,
      # but not necessarily a bare `python`).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --extra dev

      # openapi-typescript is invoked from frontend/node_modules by the script.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check OpenAPI type drift
        run: bash scripts/check-openapi-drift.sh

  # ---------------------------------------------------------------------------
  # Opt-in: requires the 22 GB DuckDB snapshot.
  #
  # This job runs the data-status release gate (scripts/check-data-status.ps1).
  # It only runs on a self-hosted runner that mounts the snapshot, and only when
  # the repository variable RUN_DATA_STATUS_GATE is set to "true" (so hosted CI
  # is never blocked by the absence of the snapshot).
  #
  # NOTE: this gate is expected to FAIL until the ETL produces a verified run
  # (audit.pipeline_run_log currently holds only failed runs). That is the gate
  # working as designed, not a CI misconfiguration — fix/refresh the ETL/audit
  # snapshot, do not weaken the gate.
  # ---------------------------------------------------------------------------
  data-status-gate:
    name: Data status gate (self-hosted, snapshot required)
    if: ${{ vars.RUN_DATA_STATUS_GATE == 'true' }}
    runs-on: [self-hosted, duckdb-snapshot]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Start sidecar
        shell: pwsh
        run: |
          Copy-Item .env.example .env -Force
          Start-Process -FilePath "uv" -ArgumentList "run","basketball-data-emporium","serve" -WorkingDirectory "$PWD"
          # Wait for the sidecar to answer before running the gate.
          $deadline = (Get-Date).AddSeconds(60)
          do {
            Start-Sleep -Seconds 2
            try { $ok = (Invoke-RestMethod http://127.0.0.1:8765/api/status).ok } catch { $ok = $false }
          } until ($ok -or (Get-Date) -gt $deadline)
          if (-not $ok) { throw "sidecar did not become ready" }

      - name: Run data-status gate
        shell: pwsh
        working-directory: .
        run: ./scripts/check-data-status.ps1
