name: Chat

# CI for the chat/ project (basketball-data-emporium chatbot).
# Backend: ruff lint, format check, ty type check, deptry, sqlfluff (conditional),
#          pytest -m "not live_llm" (DB-backed tests skip gracefully in CI).
# Frontend: tsc, eslint, prettier, vitest.
# Drift guards: OpenAPI + SSE schema regeneration checked via git diff.

on:
  push:
    branches: [main, master]
    paths:
      - "chat/**"
      - ".github/workflows/chat.yml"
  pull_request:
    paths:
      - "chat/**"
      - ".github/workflows/chat.yml"
  schedule:
    # Nightly at 06:00 UTC — runs live-LLM eval tests (paid OpenRouter calls)
    # on a self-hosted runner (label `nba-warehouse`) that has the read-only
    # DuckDB warehouse.  The job fails clearly when the warehouse is absent
    # (deliberate: a missing warehouse means no validation happened).
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Manual trigger for live-LLM validation on demand.

# Note on the warehouse: `data/nba.duckdb` (~21.5 GB) is gitignored and not
# provisioned in CI. Backend tests that depend on it MUST skip gracefully when
# the file is absent (handled at the pytest-collection layer; see comments
# inside the `backend` job's test step).

jobs:
  backend:
    if: github.event_name != 'schedule'
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat
    env:
      # CI never has the warehouse — tell the test layer to skip DB-backed
      # suites gracefully through the hard skip env var. The conftest.py
      # checks CHAT_SKIP_DB_TESTS=1 (set here) in addition to an existence
      # check on $CHAT_DUCKDB_PATH / ../data/nba.duckdb.
      # The pytest step is directory-guarded so it cleanly no-ops if the
      # test directory is ever absent.
      CHAT_SKIP_DB_TESTS: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        # Pin to 0.6.x for deterministic builds. uv.lock revision 3 is
        # compatible across uv 0.5+; 0.6.x is the current stable track.
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.x"
          working-directory: chat

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check chat_server

      - name: Ruff format check
        run: uv run ruff format --check chat_server

      - name: Type check (ty)
        run: uv run ty check chat_server

      - name: Deptry (unused / missing deps)
        run: uv run deptry chat

      - name: SQLFluff lint (templates)
        # Templates live in chat_server/templates/. Skip cleanly when the
        # directory is absent or empty (no templates to lint yet).
        run: |
          if [ -d chat_server/templates ]; then
            uv run sqlfluff lint --dialect duckdb chat_server/templates
          else
            echo "chat_server/templates/ not present — skipping sqlfluff."
          fi

      - name: Run tests (pytest)
        # The test suite skips DB-backed tests when the warehouse is absent
        # (CI never has it) via CHAT_SKIP_DB_TESTS=1. Guard the step on the
        # existence of chat_tests/ so it cleanly no-ops if absent.
        run: |
          if [ -d chat_tests ]; then
            uv run pytest -q --tb=short -m "not live_llm"
          else
            echo "chat_tests/ not present — skipping pytest."
          fi

  frontend:
    if: github.event_name != 'schedule'
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Runs the standard npm scripts: typecheck, lint, format:check, vitest.
      # Playwright e2e specs (4 present in e2e/) are not wired into CI —
      # they require the running app and warehouse, which are not available
      # in this environment.

      - name: Install dependencies
        # Prefer `npm ci` when a lockfile is present; fall back to
        # `npm install` if it is missing.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
        continue-on-error: false

      - name: Lint (eslint)
        run: npm run lint

      - name: Dead-code scan (knip)
        run: npm run knip

      - name: Format check (prettier)
        run: npm run format:check

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Production build
        run: npm run build

      - name: Bundle size check (size-limit)
        run: npm run size

  drift:
    if: github.event_name != 'schedule'
    # Regenerate the two committed snapshots (OpenAPI + SSE event JSON
    # schema) and assert `git diff --exit-code` over each. The Pydantic /
    # FastAPI code is the source of truth; the committed JSON files are the
    # contract the frontend types live off. A drift here means the PR didn't
    # re-run the export scripts after touching `chat_server/events.py`,
    # `chat_server/routes/**`, etc.
    name: Drift guards (openapi + SSE schema)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      # `git diff --exit-code` needs a working tree; give checkout a
      # HEAD so the diffs compare against the last commit.
      - name: Configure git identity
        run: |
          git config user.email "ci@example.invalid"
          git config user.name "chat-ci"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.x"
          working-directory: chat

      - name: Install backend dependencies
        run: uv sync --dev
        working-directory: chat

      # Guard #1 — REST contract
      - name: openapi drift
        working-directory: chat
        run: |
          set -euo pipefail
          uv run python scripts/export_openapi.py
          # The export script writes `frontend/openapi.json`. Fail if the
          # regenerated file differs from the committed snapshot.
          git diff --exit-code -- frontend/openapi.json

      # Guard #2 — SSE wire format
      - name: SSE schema drift
        working-directory: chat
        run: |
          set -euo pipefail
          uv run python scripts/export_sse_schema.py
          # The export script writes
          # `frontend/src/generated/sse-events.schema.json`. Fail if the
          # regenerated file differs from the committed snapshot.
          git diff --exit-code -- frontend/src/generated/sse-events.schema.json
          # Guard #3 (vitest-side) lives in the `frontend` job; this
          # CI job covers only the byte-identical snapshots.

  e2e:
    if: github.event_name != 'schedule'
    name: Playwright e2e (mocked SSE)
    runs-on: ubuntu-latest
    needs: [frontend]
    env:
      CHAT_SKIP_DB_TESTS: "1"
      DUCKDB_PATH: "./data/nba.duckdb"
      # Dummy placeholder — never a real key. The e2e specs mock the SSE stream
      # so no OpenRouter call is ever made.  The backend's Settings() requires
      # a non-empty string to start; this satisfies validation at zero cost.
      OPENROUTER_API_KEY: "sk-dummy-placeholder-for-e2e-tests"
    defaults:
      run:
        working-directory: chat/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.x"
          working-directory: chat

      - name: Install backend dependencies
        run: uv sync --dev
        working-directory: chat

      - name: Install frontend dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests (mocked-SSE specs, auto-discovered)
        # Discover all e2e/ specs except chat.smoke.ts (which requires a live
        # OpenRouter call + warehouse). New .spec.ts / .error.ts / .test.ts
        # files are automatically picked up as long as they mock the SSE stream
        # and don't need live backend credentials.
        run: |
          specs=$(ls e2e/*.ts | grep -v smoke | tr '\n' ' ')
          echo "Discovered specs: $specs"
          npx playwright test $specs --project=chromium

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            chat/frontend/test-results/
            chat/frontend/playwright-report/
          if-no-files-found: warn
          retention-days: 3

  live-llm-validation:
    # Nightly / manual validation of eval tests that make real OpenRouter calls.
    # These tests are marked `@pytest.mark.live_llm` and require:
    #   - A self-hosted runner with label `nba-warehouse`
    #   - The read-only DuckDB warehouse at the configured DUCKDB_PATH
    #   - OPENROUTER_API_KEY set as a repository secret
    # Normal push/PR CI filters these tests out via `-m "not live_llm"`.
    #
    # The job fails clearly when the warehouse is absent — deliberate:
    # silent skips produce a false-green no-op, which is worse than a
    # red build that prompts the operator to set up the runner.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Live LLM validation (eval tests)
    runs-on: [self-hosted, linux, x64, nba-warehouse]
    defaults:
      run:
        working-directory: chat
    env:
      # Forward the secret key for live OpenRouter calls. GitHub masks this
      # in logs automatically; the test layer's `@skip_no_llm` handles absent
      # or placeholder values gracefully (never logs the raw key).
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      # Path to the read-only DuckDB warehouse on the self-hosted runner.
      # Override via the repository variable CHAT_LIVE_LLM_DUCKDB_PATH
      # (set in GitHub repo Settings → Secrets and variables → Actions →
      #  Repository variables).
      #
      # Default: `../data/nba.duckdb` (relative to `chat/`, resolves to
      # `data/nba.duckdb` from the repo root).  Use an absolute path if the
      # warehouse lives outside the checkout tree.
      DUCKDB_PATH: ${{ vars.CHAT_LIVE_LLM_DUCKDB_PATH || '../data/nba.duckdb' }}

      # NOT setting CHAT_SKIP_DB_TESTS — the live_llm tests need the real
      # warehouse. The prerequisite step below validates presence explicitly.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.6.x"
          working-directory: chat

      - name: Install dependencies
        run: uv sync --dev

      - name: Verify warehouse availability
        run: |
          set -euo pipefail
          resolved="$DUCKDB_PATH"
          if [ ! -f "$resolved" ]; then
            echo "::error::Warehouse not found at DUCKDB_PATH='$resolved'"
            echo ""
            echo "This job requires a self-hosted runner (label 'nba-warehouse')"
            echo "with the read-only DuckDB warehouse accessible at the path"
            echo "above.  The warehouse is not committed to the repository."
            echo ""
            echo "To configure:"
            echo "  1. Add a self-hosted runner to the repository with labels:"
            echo "     self-hosted, linux, x64, nba-warehouse"
            echo "  2. Ensure the DuckDB file exists on the runner at the path"
            echo "     set by DUCKDB_PATH"
            echo "  3. Optionally override the path via the repository variable:"
            echo "     CHAT_LIVE_LLM_DUCKDB_PATH"
            echo "     (GitHub repo → Settings → Secrets and variables →"
            echo "      Actions → Repository variables)"
            exit 1
          fi
          echo "✓ Warehouse found at: $resolved"

      - name: Run live-LLM eval tests
        # Run only tests carrying the `live_llm` marker.  Use -rA for a
        # verbose pass/skip/fail summary per test.  The count guard below
        # ensures at least one test actually executed (not all-skipped),
        # preventing a false-green when prerequisites are misconfigured.
        run: |
          set -euo pipefail
          logfile="$RUNNER_TEMP/pytest-live-llm-output.txt"
          ! uv run pytest -q --tb=short -m "live_llm" -rA 2>&1 | tee "$logfile"
          rc=${PIPESTATUS[0]}

          # Extract passed-test count from the summary footer.
          # Typical line: "== 3 passed, 2 skipped, 1 warning in 45.32s =="
          n_pass=$(grep -oP '\d+(?= passed)' "$logfile" | tail -1)
          n_pass=${n_pass:-0}

          # Exit code 5 (no tests collected) is a valid failure already.
          # Exit code 0 with 0 passes means all tests skipped — false green.
          if [ "$n_pass" -eq 0 ] && [ "$rc" -eq 0 ]; then
            echo ""
            echo "::error::All live_llm tests skipped — nothing was validated."
            echo "Check that DUCKDB_PATH points to a valid warehouse and"
            echo "OPENROUTER_API_KEY is set to a non-placeholder value."
            grep -E '^===' "$logfile" || true
            rm -f "$logfile"
            exit 1
          fi

          rm -f "$logfile"
          exit "$rc"
