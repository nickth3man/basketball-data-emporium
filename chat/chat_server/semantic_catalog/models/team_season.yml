# Semantic catalog model: team_season
#
# Fully grounded against the live warehouse.
# Every base_table column referenced in `dimensions` and `measures` below
# was confirmed against the live warehouse via:
#
#   duckdb ../data/nba.duckdb -readonly -list -c \
#     "SELECT column_name, data_type FROM information_schema.columns
#      WHERE table_name = 'src_fact_bref_team_season_summary'
#      ORDER BY ordinal_position"
#   duckdb ../data/nba.duckdb -readonly -list -c \
#     "SELECT season, is_playoffs, COUNT(DISTINCT team_id)
#      FROM src_fact_bref_team_season_summary GROUP BY 1,2 ORDER BY 1"
#   duckdb ../data/nba.duckdb -readonly -list -c \
#     "SELECT season = season_end_year AS same
#      FROM src_fact_bref_team_season_summary GROUP BY same"
#
# Confirmed schema (selected):
#   team_id BIGINT, season INTEGER (ending year, e.g. 2016 for 2015-16),
#   season_end_year INTEGER (identical to season in all 1,770 rows),
#   league VARCHAR, lg VARCHAR,
#   team VARCHAR (full name), abbreviation VARCHAR,
#   source_team_abbrev VARCHAR, is_playoffs BOOLEAN, playoffs BOOLEAN
#     (duplicate playoff-flag columns -- identical truth values;
#     is_playoffs is the canonical flag),
#   age INTEGER,
#   w INTEGER, l INTEGER, pw INTEGER, pl INTEGER,
#   mov DOUBLE, sos DOUBLE, srs DOUBLE,
#   o_rtg DOUBLE, d_rtg DOUBLE, n_rtg DOUBLE, pace DOUBLE,
#   f_tr DOUBLE, x3p_ar DOUBLE, ts_percent DOUBLE,
#   e_fg_percent DOUBLE, tov_percent DOUBLE,
#   orb_percent DOUBLE, ft_fga DOUBLE,
#   opp_e_fg_percent DOUBLE, opp_tov_percent DOUBLE,
#   drb_percent DOUBLE, opp_ft_fga DOUBLE,
#   arena VARCHAR, attend DOUBLE, attend_g DOUBLE.
#
# Allowlist contract: src_fact_bref_team_season_summary is present in
# chat_server.schema_context.ALLOWED_TABLES_FOR_AGENT. Every catalog base
# table must be present there so governed SQL is never told a valid model is
# off-limits.
#
# Conventions (matching player_career.yml):
# - All `expr` strings are written against the `ts.` alias declared in
#   `base_table`.
# - `additivity` follows the canonical Cube.js recipes:
#   `sum` for additive season totals (w, l, pw, pl, attend, attend_g);
#   `non_additive` for ratings and rates (o_rtg, d_rtg, n_rtg, pace,
#   mov, srs, sos, percentages) which are already per-team averages and
#   must NOT be re-summed across rows.
# - Grain is one row per (team_id, season). `is_playoffs` is a
#   playoff-qualification flag on that row, NOT a separate postseason row.
#   wins/losses are regular-season totals; the flag tells you whether the
#   team reached the playoffs.

model: team_season

description: >
  Team-level season aggregates from Basketball-Reference team season
  summaries. One row per (team_id, season) with regular-season
  wins/losses and a boolean `is_playoffs` flag indicating whether the
  team reached the playoffs. Use for questions like "what was the best
  record in 2015-16", "Lakers wins by season", "Warriors offensive
  rating in 2016-17", or "team pace trends in the 2020s".

grain: one row per (team_id, season)

base_table:
  name: src_fact_bref_team_season_summary
  alias: ts

dimensions:
  - name: team_id
    expr: ts.team_id
    description: >
      Canonical team_id; relocations and rebrands share the same stable
      team_id in this warehouse (e.g. Lakers keep team_id 1610612747
      across Minneapolis and Los Angeles eras). Collapsing across a
      franchise lineage requires a `SELECT DISTINCT team_id FROM
      dim_team_era` CTE before joining to this table because
      dim_team_era has multiple rows per team_id.

  - name: season
    expr: ts.season
    description: >
      Season ending year as INTEGER (e.g. 2016 for the 2015-16 season).
      This is the only season identifier needed; `season_end_year` is
      identical in every row.

  - name: season_end_year
    expr: ts.season_end_year
    description: >
      Season end year as INTEGER, identical to `season` in every row
      (confirmed across all 1,770 warehouse rows). Duplicate column
      retained for compatibility; prefer `season`.

  - name: is_playoffs
    expr: ts.is_playoffs
    description: >
      TRUE when the team made the playoffs this season (playoff-
      qualification flag). FALSE for teams that did not. NOT a separate
      postseason row -- wins/losses are always regular-season totals.
      Identical to the duplicate `ts.playoffs` column.

  - name: league
    expr: ts.league
    description: League string (e.g. 'NBA'); non-NBA rows are filtered out by the upstream mart.

  - name: team_name
    expr: ts.team
    description: Full Basketball-Reference team name (e.g. 'Atlanta Hawks').

  - name: abbreviation
    expr: ts.abbreviation
    description: Basketball-Reference team abbreviation (e.g. 'ATL'); may differ from canonical team_abbreviation in dim_team.

  - name: arena
    expr: ts.arena
    description: Home arena for this (team, season) row.

measures:
  - name: wins
    expr: SUM(ts.w)
    description: Regular-season wins for this (team, season).
    additivity: sum

  - name: losses
    expr: SUM(ts.l)
    description: Regular-season losses for this (team, season).
    additivity: sum

  - name: games
    expr: SUM(ts.w + ts.l)
    description: Regular-season games played (wins + losses) for this (team, season).
    additivity: sum

  - name: expected_wins
    expr: SUM(ts.pw)
    description: Pythagorean expected wins (p-w).
    additivity: sum

  - name: expected_losses
    expr: SUM(ts.pl)
    description: Pythagorean expected losses (p-l).
    additivity: sum

  - name: win_pct
    expr: SUM(ts.w) / NULLIF(SUM(ts.w + ts.l), 0)
    description: Regular-season win percentage (w / (w + l)); NULL when no games. non_additive to discourage re-averaging.
    additivity: non_additive

  - name: offensive_rating
    expr: AVG(ts.o_rtg)
    description: Offensive rating (points scored per 100 possessions); AVG across rows in scope.
    additivity: non_additive

  - name: defensive_rating
    expr: AVG(ts.d_rtg)
    description: Defensive rating (points allowed per 100 possessions).
    additivity: non_additive

  - name: net_rating
    expr: AVG(ts.n_rtg)
    description: Net rating (o_rtg - d_rtg).
    additivity: non_additive

  - name: pace
    expr: AVG(ts.pace)
    description: Possessions per 48 minutes (team pace).
    additivity: non_additive

  - name: margin_of_victory
    expr: AVG(ts.mov)
    description: Average margin of victory (points per game).
    additivity: non_additive

  - name: simple_rating_system
    expr: AVG(ts.srs)
    description: Simple Rating System (MOV + strength of schedule).
    additivity: non_additive

  - name: strength_of_schedule
    expr: AVG(ts.sos)
    description: Strength of schedule.
    additivity: non_additive

  - name: true_shooting_pct
    expr: AVG(ts.ts_percent)
    description: Team true-shooting percentage.
    additivity: non_additive

  - name: effective_fg_pct
    expr: AVG(ts.e_fg_percent)
    description: Team effective field-goal percentage.
    additivity: non_additive

  - name: total_attendance
    expr: SUM(ts.attend)
    description: Total home attendance for the season.
    additivity: sum

  - name: avg_attendance_per_game
    expr: AVG(ts.attend_g)
    description: Average attendance per home game.
    additivity: non_additive

  - name: distinct_teams
    expr: COUNT(DISTINCT ts.team_id)
    description: Distinct team count in scope.
    additivity: count_distinct

joins: []

caveats:
  - >
    Source-backed table in the src_* layer (Basketball-Reference
    fact_bref_team_season_summary source CSV). It is explicitly allowlisted
    for governed SQL because this catalog model is its supported interface.
  - >
    `season` is the ending year (2016 means 2015-16). `season_end_year`
    is an identical duplicate column. Wins and losses are regular-season
    totals; `is_playoffs` is a boolean flag indicating playoff qualification,
    NOT a separate postseason row.
  - >
    Relocated franchises (e.g. Seattle SuperSonics -> Oklahoma City
    Thunder, Charlotte Bobcats -> Charlotte Hornets) share the same
    stable team_id in this warehouse. `dim_team_era` has multiple era
    rows per team_id (one row per location/rebrand). SUMming wins across
    a whole franchise history requires collapsing through `dim_team_era`
    first -- use a `SELECT DISTINCT team_id FROM dim_team_era` CTE before
    joining to this table.

synonyms:
  - team record
  - season record
  - team stats
  - team season summary

example_questions:
  - What was the Warriors record in 2015-16?
  - Lakers wins by season.
  - Team pace leaders in the 2020s.
  - Which team had the best offensive rating in 2022-23?
