<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ask grounded questions about NBA stats. Every answer is backed by the warehouse — never model memory."
    />
    <meta name="color-scheme" content="dark" />
    <!--
      Baller Design System is dark-only. Set the charcoal canvas here so
      the very first frame matches the brand (no white flash). next-themes
      forces the `.dark` class before paint via attribute="class".
    -->
    <style>
      html {
        background-color: #1a1a1e;
      }
    </style>
    <title>Basketball Data Chatbot</title>
    <!-- Condensed scoreboard type: Oswald (display) + DM Sans (body) +
         JetBrains Mono (code). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&family=Oswald:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
