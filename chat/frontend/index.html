<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ask grounded questions about NBA stats. Every answer is backed by the warehouse — never model memory."
    />
    <meta name="color-scheme" content="light dark" />
    <!--
      next-themes flashes the resolved theme class onto <html> before paint
      via an injected script (attribute="class"). Set a background here so
      the very first frame matches whichever theme wins, avoiding a white
      flash in dark mode. The inline style is intentionally minimal.
    -->
    <style>
      html {
        background-color: #fdfcfa;
      }
      html.dark {
        background-color: #23262f;
      }
    </style>
    <title>Basketball Data Chatbot</title>
    <!-- Distinctive, characterful type: Space Grotesk (display) +
         DM Sans (body) + JetBrains Mono (code). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
