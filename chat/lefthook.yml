# Chat hooks have been merged into the root lefthook.yml at the repo root.
#
# The root config is auto-installed via `npm install` → `lefthook install`
# and covers both web/ and chat/ hooks (pre-commit + pre-push).
#
# Standalone `cd chat && lefthook install` is no longer needed — it would
# install a duplicate set of hooks that reference this config, which is now
# intentionally empty. All chat hooks live in the root config instead.
